name: CI

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - run: rustup target add wasm32-wasip1
      - run: cargo test
      - run: cargo build --target wasm32-wasip1
