name: Publish

permissions:
  contents: write

on:
  workflow_run:
    workflows:
      - Release PR
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag to publish, for example v0.1.0
        required: true
        type: string

jobs:
  resolve_tag:
    name: Resolve tag
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags origin
      - id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" 'v*' | head -n 1)
          fi

          if [[ -z "$tag" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    needs: resolve_tag
    if: needs.resolve_tag.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - id: build
        uses: moonrepo/build-wasm-plugin@v0
      - uses: ncipollo/release-action@v1
        with:
          artifacts: builds/*
          artifactErrorsFailBuild: true
          body: ${{ steps.build.outputs.changelog-entry }}
          makeLatest: true
          name: ${{ needs.resolve_tag.outputs.tag }}
          prerelease: ${{ contains(needs.resolve_tag.outputs.tag, '-alpha') || contains(needs.resolve_tag.outputs.tag, '-beta') || contains(needs.resolve_tag.outputs.tag, '-rc') }}
          skipIfReleaseExists: true
          tag: ${{ needs.resolve_tag.outputs.tag }}
