name: Publish

permissions:
  contents: write

on:
  workflow_run:
    workflows:
      - Release PR
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag to publish, for example v0.1.0
        required: true
        type: string

jobs:
  resolve_tag:
    name: Resolve tag
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags origin
      - id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" 'v*' | head -n 1)
          fi

          if [[ -z "$tag" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    needs: resolve_tag
    if: needs.resolve_tag.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.resolve_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve_tag.outputs.tag }}
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - run: rustup target add wasm32-wasip1
      - name: Build wasm plugin
        shell: bash
        run: |
          cargo build --target wasm32-wasip1 --release
          mkdir -p builds
          cp target/wasm32-wasip1/release/ocaml_plugin.wasm "builds/ocaml_plugin-${RELEASE_TAG}.wasm"
      - name: Extract release notes
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { in_section=1 }
            in_section && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Failed to extract release notes for ${RELEASE_TAG}" >&2
            exit 1
          fi
      - uses: ncipollo/release-action@v1
        with:
          artifacts: builds/*
          artifactErrorsFailBuild: true
          bodyFile: release-notes.md
          makeLatest: true
          name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(needs.resolve_tag.outputs.tag, '-alpha') || contains(needs.resolve_tag.outputs.tag, '-beta') || contains(needs.resolve_tag.outputs.tag, '-rc') }}
          skipIfReleaseExists: true
          tag: ${{ env.RELEASE_TAG }}
